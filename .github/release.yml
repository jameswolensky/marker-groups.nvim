changelog:
  categories:
    - title: Breaking Changes
      labels:
        - breaking-change
        - breaking
    - title: Features
      labels:
        - feature
        - enhancement
    - title: Bug Fixes
      labels:
        - bug
        - fix
    - title: Performance
      labels:
        - perf
    - title: Documentation
      labels:
        - documentation
        - docs
    - title: CI & Build
      labels:
        - ci
        - build
    - title: Refactors & Chore
      labels:
        - refactor
        - chore
  exclude:
    labels:
      - skip-changelog


