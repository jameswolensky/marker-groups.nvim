name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify PLUGIN_VERSION matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ ! -f PLUGIN_VERSION ]; then
            echo "PLUGIN_VERSION file not found in tag commit" >&2
            exit 1
          fi
          FILE_VERSION="$(cat PLUGIN_VERSION)"
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match PLUGIN_VERSION ($FILE_VERSION)" >&2
            exit 1
          fi

      - name: Create release with auto-generated notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
