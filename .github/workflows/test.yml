name: test

permissions:
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        neovim_version: ['v0.8.0', 'v0.9.0', 'v0.10.0', 'stable']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Neovim
      uses: rhysd/action-setup-vim@v1
      with:
        neovim: true
        version: ${{ matrix.neovim_version }}
    
    - name: Install dependencies
      run: |
        # Create plugins directory
        mkdir -p ~/.local/share/nvim/site/pack/testing/start/
        
        # Install plenary.nvim (required for testing)
        git clone https://github.com/nvim-lua/plenary.nvim \
          ~/.local/share/nvim/site/pack/testing/start/plenary.nvim
        
        # Install telescope.nvim (optional, for full functionality)
        git clone https://github.com/nvim-telescope/telescope.nvim \
          ~/.local/share/nvim/site/pack/testing/start/telescope.nvim
    
    - name: Add plugin to runtime path
      run: |
        # Make the plugin available to Neovim
        mkdir -p ~/.local/share/nvim/site/pack/testing/start/marker-groups.nvim
        cp -r . ~/.local/share/nvim/site/pack/testing/start/marker-groups.nvim/
    
    - name: Run syntax check
      run: |
        # Basic Lua syntax check
        find lua tests -name "*.lua" -exec nvim --headless -c "luafile {}" -c "qa!" \;
    
    - name: Run unit tests
      run: |
        nvim --headless --noplugin \
          -c "set rtp+=~/.local/share/nvim/site/pack/testing/start/*" \
          -c "lua require('tests.test_runner').run_unit({verbose=true,timeout=30000})" \
          -c "qa!"
    
    - name: Run integration tests
      run: |
        nvim --headless --noplugin \
          -c "set rtp+=~/.local/share/nvim/site/pack/testing/start/*" \
          -c "lua require('tests.test_runner').run_integration({verbose=true,timeout=30000})" \
          -c "qa!"
    
    - name: Run health check
      run: |
        nvim --headless --noplugin \
          -c "set rtp+=~/.local/share/nvim/site/pack/testing/start/*" \
          -c "lua require('marker-groups').setup()" \
          -c "lua require('marker-groups.health').check()" \
          -c "qa!"
    
    - name: Test plugin loading
      run: |
        # Test that plugin loads without errors
        nvim --headless --noplugin \
          -c "set rtp+=~/.local/share/nvim/site/pack/testing/start/*" \
          -c "lua require('marker-groups').setup()" \
          -c "lua print('Plugin loaded successfully')" \
          -c "qa!"

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install stylua
      run: |
        curl -L "https://github.com/JohnnyMorganz/StyLua/releases/download/v0.20.0/stylua-linux-x86_64.zip" -o stylua.zip
        unzip stylua.zip
        chmod +x stylua
        sudo mv stylua /usr/local/bin/
    
    - name: Check code formatting
      run: |
        stylua --check lua/ tests/

  compatibility:
    name: Test Compatibility
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        neovim_version: ['stable']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Neovim
      uses: rhysd/action-setup-vim@v1
      with:
        neovim: true
        version: ${{ matrix.neovim_version }}
    
    - name: Install dependencies
      run: |
        mkdir -p ~/.local/share/nvim/site/pack/testing/start/
        git clone https://github.com/nvim-lua/plenary.nvim \
          ~/.local/share/nvim/site/pack/testing/start/plenary.nvim
    
    - name: Test basic functionality
      run: |
        mkdir -p ~/.local/share/nvim/site/pack/testing/start/marker-groups.nvim
        cp -r . ~/.local/share/nvim/site/pack/testing/start/marker-groups.nvim/
        
        nvim --headless --noplugin \
          -c "set rtp+=~/.local/share/nvim/site/pack/testing/start/*" \
          -c "lua require('marker-groups').setup()" \
          -c "lua require('marker-groups.health').check()" \
          -c "qa!"

  ci:
    name: CI Aggregate
    runs-on: ubuntu-latest
    needs: [test, lint, compatibility]
    steps:
      - run: echo "All required checks passed."
